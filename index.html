        document.getElementById('preview-frame').srcdoc = finalCode;
        document.getElementById('genially-code').innerText = finalCode;
    }

    function copy() {
        const txt = document.getElementById('genially-code').innerText;
        navigator.clipboard.writeText(txt);
        alert("Copied! Paste into Genially (Insert -> Others).");
    }

    window.onload = generate;
</script>

document.addEventListener('contextmenu', function(e) {

// Блокировка горячих клавиш
document.addEventListener('keydown', function(e) {
